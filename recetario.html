<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetario de casa</title>
<style>
  :root{
    --bg:#faf8f5;
    --card:#ffffff;
    --text:#2b2420;
    --muted:#6b6058;
    --border:#e8e1d8;
    --accent:#b5502f;
    --accent-soft:#f3e2da;
    --tag-carne:#f6dede; --tag-carne-text:#8a3030;
    --tag-pollo:#fbeecb; --tag-pollo-text:#8a6a12;
    --tag-cerdo:#f0e2f6; --tag-cerdo-text:#6a3a8a;
    --tag-relleno:#dcefe3; --tag-relleno-text:#2f6b47;
    --shadow: 0 1px 2px rgba(30,20,10,0.06), 0 4px 14px rgba(30,20,10,0.06);
    --warn-bg:#fdf0e2; --warn-text:#8a5a12;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1b1815;
      --card:#242019;
      --text:#f1ece4;
      --muted:#b3a89c;
      --border:#3a332b;
      --accent:#e2794f;
      --accent-soft:#3a2620;
      --tag-carne:#4a2626; --tag-carne-text:#f0b7b7;
      --tag-pollo:#4a3d1c; --tag-pollo-text:#f2d998;
      --tag-cerdo:#3c2c48; --tag-cerdo-text:#dcb8f0;
      --tag-relleno:#20402c; --tag-relleno-text:#a9e0bd;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 14px rgba(0,0,0,0.35);
      --warn-bg:#3a2c14; --warn-text:#f2c98a;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:20px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  header{margin-bottom:20px;}
  h1{font-size:1.5rem;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:0.92rem;margin:0;}

  #pinGate{
    position:fixed;
    inset:0;
    background:var(--bg);
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .pin-box{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:24px;
    max-width:320px;
    width:100%;
    text-align:center;
  }
  .pin-box h2{margin:0 0 8px;font-size:1.2rem;}
  .pin-box input{margin:14px 0 10px;text-align:center;letter-spacing:2px;}
  #app{display:none;}

  .panel{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    box-shadow:var(--shadow);
    padding:16px;
    margin-bottom:18px;
  }
  .panel h2{font-size:1rem;margin:0 0 12px;}

  form.add-form{display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .row > *{flex:1;min-width:140px;}
  label{font-size:0.78rem;color:var(--muted);display:block;margin-bottom:4px;}
  input[type=text], input[type=password], select, textarea{
    width:100%;
    padding:9px 10px;
    border-radius:9px;
    border:1px solid var(--border);
    background:var(--bg);
    color:var(--text);
    font-size:0.95rem;
    font-family:inherit;
  }
  button{
    cursor:pointer;
    border:none;
    border-radius:9px;
    padding:10px 16px;
    font-size:0.95rem;
    font-weight:600;
  }
  button:disabled{opacity:0.6;cursor:default;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:active{opacity:0.85;}
  .btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost{background:var(--accent-soft);color:var(--accent);}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}

  .grid{display:grid;grid-template-columns:1fr;gap:10px;}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr;}}

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    gap:6px;
    position:relative;
  }
  .card.highlight{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
  .card h3{margin:0;font-size:1rem;padding-right:50px;}
  .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:0.7rem;padding:3px 8px;border-radius:999px;font-weight:600;}
  .tag.carne{background:var(--tag-carne);color:var(--tag-carne-text);}
  .tag.pollo{background:var(--tag-pollo);color:var(--tag-pollo-text);}
  .tag.cerdo{background:var(--tag-cerdo);color:var(--tag-cerdo-text);}
  .tag.relleno{background:var(--tag-relleno);color:var(--tag-relleno-text);}
  .tag.coc{background:transparent;border:1px solid var(--border);color:var(--muted);}
  .card-actions{position:absolute;top:8px;right:8px;display:flex;gap:2px;}
  .icon-btn{
    background:none;border:none;color:var(--muted);
    font-size:0.9rem;padding:3px 6px;border-radius:6px;
  }
  .icon-btn:hover{color:var(--accent);}
  .card p.extra{margin:4px 0 0;font-size:0.85rem;color:var(--muted);white-space:pre-wrap;}

  .empty{color:var(--muted);font-size:0.9rem;text-align:center;padding:30px 0;}

  .note{
    font-size:0.8rem;
    color:var(--muted);
    background:var(--accent-soft);
    border-radius:10px;
    padding:10px 12px;
    margin-top:6px;
  }
  .warn{
    font-size:0.8rem;
    color:var(--warn-text);
    background:var(--warn-bg);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:14px;
  }
  .count{color:var(--muted);font-size:0.85rem;margin-bottom:10px;}

  .ai-result{
    border:1px dashed var(--accent);
    border-radius:12px;
    padding:12px 14px;
    margin-top:12px;
    background:var(--accent-soft);
  }
  .ai-result h3{margin:0 0 6px;}
  .ai-result .btn-row{margin-top:10px;}
  .spinner{
    display:inline-block;width:14px;height:14px;
    border:2px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite;
    vertical-align:middle;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .small{font-size:0.78rem;color:var(--muted);}
</style>
</head>
<body>

<div id="pinGate">
  <div class="pin-box">
    <h2>🔒 Recetario familiar</h2>
    <p class="small">Ingresá el código para ver y editar las recetas.</p>
    <input type="password" id="pinInput" placeholder="Código" inputmode="numeric" autocomplete="off">
    <button class="btn-primary" id="pinSubmit" type="button" style="width:100%;">Entrar</button>
    <p class="small" id="pinError" style="display:none;color:var(--warn-text);margin-top:10px;"></p>
  </div>
</div>

<div class="wrap" id="app">
  <header>
    <h1>🍽️ Recetario de casa</h1>
    <p class="sub">Compartido para toda la familia. Agregá, editá, sorteá o inventá algo nuevo con IA.</p>
  </header>

  <div id="saveError" class="warn" style="display:none;"></div>

  <div class="panel">
    <h2 id="formTitle">Agregar comida o receta</h2>
    <form class="add-form" id="addForm">
      <input type="hidden" id="editingId" value="">
      <div class="row">
        <div>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ej: Pollo al verdeo" required>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="categoria">Proteína / tipo</label>
          <select id="categoria">
            <option value="carne">Carne vacuna</option>
            <option value="pollo">Pollo</option>
            <option value="cerdo">Cerdo / embutidos</option>
            <option value="relleno">Relleno / masa / veggie</option>
          </select>
        </div>
        <div>
          <label for="coccion">Cocción</label>
          <select id="coccion">
            <option value="Horno">Horno</option>
            <option value="Plancha/Parrilla">Plancha / Parrilla</option>
            <option value="Frito">Frito</option>
            <option value="Hervido/Guisado">Hervido / guisado</option>
            <option value="Relleno al horno">Relleno al horno</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="ingredientes">Ingredientes (opcional)</label>
          <textarea id="ingredientes" rows="2" placeholder="Ej: pechuga, mostaza, crema"></textarea>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="preparacion">Cómo se hace (opcional)</label>
          <textarea id="preparacion" rows="3" placeholder="Pasos para prepararla..."></textarea>
        </div>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn-primary" id="submitBtn">+ Agregar a la lista</button>
        <button type="button" class="btn-secondary" id="cancelEdit" style="display:none;">Cancelar edición</button>
      </div>
    </form>
  </div>

  <div class="panel">
    <h2>¿Qué comemos?</h2>
    <div class="btn-row">
      <button class="btn-ghost" id="randomBtn" type="button">🎲 Elegir al azar</button>
      <button class="btn-ghost" id="inventBtn" type="button">✨ Inventar una receta nueva</button>
    </div>
    <div id="aiResult"></div>
  </div>

  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyMsg" style="display:none;">Todavía no hay comidas cargadas.</div>
</div>

<script>
const CAT_LABELS = {carne:"Carne vacuna", pollo:"Pollo", cerdo:"Cerdo / embutidos", relleno:"Relleno / masa"};
const PIN_KEY = 'recetario_pin';
let PIN = localStorage.getItem(PIN_KEY) || '';

const DEFAULT_RECIPES = [
  {n:"Matambre", cat:"carne", coc:"Plancha/Parrilla", ingredientes:"", preparacion:""},
  {n:"Pizza", cat:"relleno", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Milanesa", cat:"carne", coc:"Frito", ingredientes:"", preparacion:""},
  {n:"Hamburguesa", cat:"carne", coc:"Plancha/Parrilla", ingredientes:"", preparacion:""},
  {n:"Zapallito relleno", cat:"relleno", coc:"Relleno al horno", ingredientes:"", preparacion:""},
  {n:"Carne al horno", cat:"carne", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Tacos", cat:"relleno", coc:"Hervido/Guisado", ingredientes:"", preparacion:""},
  {n:"Tarteletitas de pollo", cat:"pollo", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Salchichas con panceta", cat:"cerdo", coc:"Plancha/Parrilla", ingredientes:"", preparacion:""},
  {n:"Arroz con pollo", cat:"pollo", coc:"Hervido/Guisado", ingredientes:"", preparacion:""},
  {n:"Bife con papas y cebolla", cat:"carne", coc:"Plancha/Parrilla", ingredientes:"", preparacion:""},
  {n:"Tarta", cat:"relleno", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Lasaña", cat:"relleno", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Empanadas", cat:"relleno", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Bondiola", cat:"cerdo", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Panchos", cat:"cerdo", coc:"Hervido/Guisado", ingredientes:"", preparacion:""},
  {n:"Pollo frito", cat:"pollo", coc:"Frito", ingredientes:"", preparacion:""},
  {n:"Nuggets", cat:"pollo", coc:"Frito", ingredientes:"", preparacion:""},
  {n:"Pechuga a la plancha", cat:"pollo", coc:"Plancha/Parrilla", ingredientes:"", preparacion:""},
  {n:"Pastel de papas", cat:"carne", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Canelones", cat:"relleno", coc:"Horno", ingredientes:"", preparacion:""},
  {n:"Suprema a la parmesana", cat:"pollo", coc:"Frito", ingredientes:"", preparacion:""},
  {n:"Berenjenas rellenas", cat:"relleno", coc:"Relleno al horno", ingredientes:"", preparacion:""},
  {n:"Matambrito de cerdo a la plancha", cat:"cerdo", coc:"Plancha/Parrilla", ingredientes:"", preparacion:""},
  {n:"Pollo al verdeo", cat:"pollo", coc:"Hervido/Guisado", ingredientes:"", preparacion:""},
  {n:"Choripán", cat:"cerdo", coc:"Plancha/Parrilla", ingredientes:"", preparacion:""},
  {n:"Quesadillas de pollo", cat:"pollo", coc:"Plancha/Parrilla", ingredientes:"", preparacion:""},
];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function normalizeRecipe(r){
  return {
    id: r.id || uid(),
    n: r.n || '',
    cat: r.cat || 'relleno',
    coc: r.coc || 'Horno',
    ingredientes: r.ingredientes !== undefined ? r.ingredientes : (r.d || ''),
    preparacion: r.preparacion || '',
  };
}

let recipes = [];

// ---------- Backend + PIN gate ----------
const gate = document.getElementById('pinGate');
const app = document.getElementById('app');
const pinInput = document.getElementById('pinInput');
const pinSubmitBtn = document.getElementById('pinSubmit');
const pinError = document.getElementById('pinError');

function apiHeaders(){
  return { 'Content-Type': 'application/json', 'x-recetario-pin': PIN };
}

async function fetchRecipes(){
  const res = await fetch('/api/recetas', { headers: apiHeaders() });
  if(!res.ok){
    const err = new Error(res.status === 401 ? 'Código incorrecto.' : `Error del servidor (${res.status}).`);
    err.code = res.status;
    throw err;
  }
  return res.json();
}

async function persistRecipes(){
  const res = await fetch('/api/recetas', {
    method: 'POST',
    headers: apiHeaders(),
    body: JSON.stringify({ recetas: recipes })
  });
  if(!res.ok){
    const err = new Error(res.status === 401 ? 'Código incorrecto.' : `Error del servidor (${res.status}).`);
    err.code = res.status;
    throw err;
  }
}

async function saveRecipes(){
  try{
    await persistRecipes();
    hideSaveError();
  }catch(err){
    if(err.code === 401){
      PIN = '';
      localStorage.removeItem(PIN_KEY);
      showGate('El código ya no es válido, volvé a ingresarlo.');
    } else {
      showSaveError('No se pudo guardar en el servidor: ' + err.message);
    }
  }
}

function showSaveError(msg){
  const el = document.getElementById('saveError');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideSaveError(){
  document.getElementById('saveError').style.display = 'none';
}

function showGate(message){
  app.style.display = 'none';
  gate.style.display = 'flex';
  pinError.style.display = message ? 'block' : 'none';
  pinError.textContent = message || '';
  pinInput.value = '';
  pinInput.focus();
}

function hideGate(){
  gate.style.display = 'none';
  app.style.display = 'block';
}

async function applyLoadedData(data){
  if(data.recetas && Array.isArray(data.recetas) && data.recetas.length){
    recipes = data.recetas.map(normalizeRecipe);
  } else {
    recipes = DEFAULT_RECIPES.map(r => ({...r, id: uid()}));
    await persistRecipes();
  }
}

async function tryPin(){
  const value = pinInput.value.trim();
  if(!value) return;
  PIN = value;
  pinSubmitBtn.disabled = true;
  pinSubmitBtn.textContent = 'Entrando...';
  try{
    const data = await fetchRecipes();
    localStorage.setItem(PIN_KEY, PIN);
    await applyLoadedData(data);
    hideGate();
    render();
  }catch(err){
    PIN = '';
    pinError.style.display = 'block';
    pinError.textContent = err.code === 401 ? 'Código incorrecto.' : ('Error: ' + err.message);
  }finally{
    pinSubmitBtn.disabled = false;
    pinSubmitBtn.textContent = 'Entrar';
  }
}

pinSubmitBtn.addEventListener('click', tryPin);
pinInput.addEventListener('keydown', (e) => { if(e.key === 'Enter'){ e.preventDefault(); tryPin(); } });

async function boot(){
  if(!PIN){
    showGate();
    return;
  }
  try{
    const data = await fetchRecipes();
    await applyLoadedData(data);
    hideGate();
    render();
  }catch(err){
    PIN = '';
    localStorage.removeItem(PIN_KEY);
    showGate(err.code === 401 ? 'El código ya no es válido, volvé a ingresarlo.' : 'No se pudo conectar. Probá de nuevo.');
  }
}

// ---------- Render list ----------
function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  document.getElementById('count').textContent = `${recipes.length} comidas`;
  document.getElementById('emptyMsg').style.display = recipes.length ? 'none' : 'block';

  recipes.forEach((r) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = r.id;
    card.innerHTML = `
      <div class="card-actions">
        <button class="icon-btn" title="Editar" onclick="startEdit('${r.id}')">✎</button>
        <button class="icon-btn" title="Quitar" onclick="removeRecipe('${r.id}')">✕</button>
      </div>
      <h3>${escapeHtml(r.n)}</h3>
      <div class="tags">
        <span class="tag ${r.cat}">${CAT_LABELS[r.cat]}</span>
        <span class="tag coc">${escapeHtml(r.coc)}</span>
      </div>
      ${r.ingredientes ? `<p class="extra"><strong>Ingredientes:</strong> ${escapeHtml(r.ingredientes)}</p>` : ''}
      ${r.preparacion ? `<p class="extra"><strong>Cómo se hace:</strong> ${escapeHtml(r.preparacion)}</p>` : ''}
    `;
    grid.appendChild(card);
  });
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------- Add / edit form ----------
const form = document.getElementById('addForm');
const submitBtn = document.getElementById('submitBtn');
const cancelEditBtn = document.getElementById('cancelEdit');
const formTitle = document.getElementById('formTitle');

function startEdit(id){
  const r = recipes.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('editingId').value = id;
  document.getElementById('nombre').value = r.n;
  document.getElementById('categoria').value = r.cat;
  document.getElementById('coccion').value = r.coc;
  document.getElementById('ingredientes').value = r.ingredientes || '';
  document.getElementById('preparacion').value = r.preparacion || '';
  submitBtn.textContent = 'Guardar cambios';
  cancelEditBtn.style.display = 'inline-block';
  formTitle.textContent = `Editando: ${r.n}`;
  form.scrollIntoView({behavior:'smooth', block:'start'});
}

function resetForm(){
  document.getElementById('editingId').value = '';
  form.reset();
  submitBtn.textContent = '+ Agregar a la lista';
  cancelEditBtn.style.display = 'none';
  formTitle.textContent = 'Agregar comida o receta';
}

cancelEditBtn.addEventListener('click', resetForm);

form.addEventListener('submit', async function(e){
  e.preventDefault();
  const nombre = document.getElementById('nombre').value.trim();
  const cat = document.getElementById('categoria').value;
  const coc = document.getElementById('coccion').value;
  const ingredientes = document.getElementById('ingredientes').value.trim();
  const preparacion = document.getElementById('preparacion').value.trim();
  if(!nombre) return;

  const editingId = document.getElementById('editingId').value;
  if(editingId){
    const r = recipes.find(x=>x.id===editingId);
    if(r){ r.n = nombre; r.cat = cat; r.coc = coc; r.ingredientes = ingredientes; r.preparacion = preparacion; }
  } else {
    recipes.unshift({id:uid(), n:nombre, cat, coc, ingredientes, preparacion});
  }
  resetForm();
  render();
  await saveRecipes();
});

async function removeRecipe(id){
  recipes = recipes.filter(r=>r.id!==id);
  render();
  await saveRecipes();
}

// ---------- Random pick ----------
document.getElementById('randomBtn').addEventListener('click', ()=>{
  if(!recipes.length){
    showAiResult(`<p>Todavía no hay comidas cargadas para elegir.</p>`);
    return;
  }
  const pick = recipes[Math.floor(Math.random() * recipes.length)];
  showAiResult(`
    <div class="ai-result">
      <h3>🎲 Hoy toca: ${escapeHtml(pick.n)}</h3>
      <div class="tags">
        <span class="tag ${pick.cat}">${CAT_LABELS[pick.cat]}</span>
        <span class="tag coc">${escapeHtml(pick.coc)}</span>
      </div>
      ${pick.ingredientes ? `<p class="extra"><strong>Ingredientes:</strong> ${escapeHtml(pick.ingredientes)}</p>` : ''}
      ${pick.preparacion ? `<p class="extra"><strong>Cómo se hace:</strong> ${escapeHtml(pick.preparacion)}</p>` : ''}
      <div class="btn-row">
        <button class="btn-secondary" type="button" onclick="document.getElementById('randomBtn').click()">Tirar de nuevo</button>
      </div>
    </div>
  `);
});

function showAiResult(html){
  document.getElementById('aiResult').innerHTML = html;
}

// ---------- Invent recipe with AI ----------
document.getElementById('inventBtn').addEventListener('click', async ()=>{
  showAiResult(`<div class="ai-result"><p><span class="spinner"></span>Pensando una receta nueva...</p></div>`);

  try{
    const texto = await callBackend();
    const parsed = extractJson(texto);
    if(!parsed || !parsed.nombre){
      throw new Error('La IA no devolvió un formato entendible. Probá de nuevo.');
    }
    renderAiSuggestion(parsed);
  }catch(err){
    showAiResult(`
      <div class="ai-result">
        <p><strong>No se pudo generar la receta.</strong></p>
        <p class="small">${escapeHtml(err.message || String(err))}</p>
      </div>
    `);
  }
});

async function callBackend(){
  const res = await fetch('/api/recetario', {
    method: 'POST',
    headers: apiHeaders(),
    body: JSON.stringify({ recetas: recipes.map(r => `${r.n} (${r.coc})`) })
  });
  if(!res.ok){
    const t = await res.text();
    throw new Error(`El servidor respondió ${res.status}: ${t.slice(0,200)}`);
  }
  const json = await res.json();
  return json.texto || '';
}

function extractJson(text){
  if(!text) return null;
  let cleaned = text.trim().replace(/^```(json)?/i,'').replace(/```$/,'').trim();
  try{
    return JSON.parse(cleaned);
  }catch(e){
    const match = cleaned.match(/\{[\s\S]*\}/);
    if(match){
      try{ return JSON.parse(match[0]); }catch(e2){ return null; }
    }
    return null;
  }
}

function renderAiSuggestion(sug){
  const cat = ['carne','pollo','cerdo','relleno'].includes(sug.categoria) ? sug.categoria : 'relleno';
  const coc = sug.coccion || 'Horno';
  window.__lastSuggestion = {id:uid(), n:sug.nombre, cat, coc, ingredientes: sug.ingredientes || '', preparacion: sug.preparacion || ''};
  showAiResult(`
    <div class="ai-result">
      <h3>✨ ${escapeHtml(sug.nombre)}</h3>
      <div class="tags">
        <span class="tag ${cat}">${CAT_LABELS[cat]}</span>
        <span class="tag coc">${escapeHtml(coc)}</span>
      </div>
      ${sug.ingredientes ? `<p class="extra"><strong>Ingredientes:</strong> ${escapeHtml(sug.ingredientes)}</p>` : ''}
      ${sug.preparacion ? `<p class="extra"><strong>Preparación:</strong> ${escapeHtml(sug.preparacion)}</p>` : ''}
      <div class="btn-row">
        <button class="btn-primary" type="button" onclick="acceptSuggestion()">+ Agregar a mi recetario</button>
        <button class="btn-secondary" type="button" onclick="document.getElementById('inventBtn').click()">Probar otra</button>
      </div>
    </div>
  `);
}

async function acceptSuggestion(){
  if(!window.__lastSuggestion) return;
  recipes.unshift(window.__lastSuggestion);
  window.__lastSuggestion = null;
  showAiResult(`<div class="ai-result"><p>Agregada a la lista ✅</p></div>`);
  render();
  await saveRecipes();
}

boot();
</script>
</body>
</html>
